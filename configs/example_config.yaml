# stdg-eval dashboard configuration
# -----------------------------------------------------------
# Launch the dashboard with this config:
#   stdg-eval dashboard --config configs/example_config.yaml
# or:
#   streamlit run run_dashboard.py -- --config configs/example_config.yaml

# Path to the real (ground-truth) dataset CSV
real_data: data/real.csv

# One entry per synthetic dataset to evaluate
synthetic_datasets:
  - name: synth1
    path: data/synth1.csv
  - name: synth2
    path: data/synth2.csv
  - name: synth3
    path: data/synth3.csv

# Optional: override automatic column type inference.
# Supported types: numerical, categorical
# column_types:
#   age: numerical
#   bmi: numerical
#   sbp: numerical
#   sex: categorical
#   diagnosis: categorical
#   smoker: categorical

# Optional: enable or disable individual metrics (all default to true if omitted)
# metrics:
#   fidelity:
#     wasserstein: true        # Wasserstein distance (numerical columns)
#     tvd: true                # Total variation distance (categorical columns)
#     hellinger: true          # Hellinger distance (all columns)
#     spearman: true           # Spearman correlation (numerical pairs)
#     contingency: true        # Contingency TVD (categorical / mixed pairs)
#     pcd: true                # Phi-k correlation difference (all pairs)
#     auc_roc: true            # Classifier AUC-ROC (distinguishability)
#     propensity_mse: true     # Propensity score MSE
#     crcl_rs: false           # Cross-classification real→synth (expensive)
#     crcl_sr: false           # Cross-classification synth→real (expensive)
#   missingness:
#     rate: true               # Per-variable missingness rates
#     set_distribution: true   # Missingness pattern distribution TVD
#     missing_auroc: true      # Classifier AUROC on missingness indicator
#     dependency_structure: true  # Missingness dependency structure

# Optional: scoring weights (all auto-normalised; defaults shown)
# weights:
#   fidelity: [0.34, 0.33, 0.33]          # [univariate, bivariate, multivariate]
#   missingness: [0.25, 0.25, 0.25, 0.25] # [rate, set_distribution, missing_auroc, dependency_structure]
#   composite: [0.5, 0.5]                 # [fidelity, missingness]

# Optional: path to precomputed results (JSON).
# Generate with:  stdg-eval precompute --config configs/example_config.yaml --output precomputed.json
# When present, the dashboard loads these results directly and skips recomputing
# expensive metrics (bivariate, multivariate).
# precomputed_results: precomputed.json

# Optional: path to meta-evaluation results (JSON).
# Generate with:  stdg-eval meta-eval --config configs/example_meta_eval_config.yaml
# When present, populates the Meta-evaluation tab in the dashboard.
# meta_eval_results: meta_eval/results.json

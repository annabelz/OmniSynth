# stdg-eval example configuration file
# -----------------------------------------------------------
# Pass this file to the dashboard:
#   streamlit run run_dashboard.py -- --config configs/example_config.yaml
# or:
#   stdg-eval dashboard --config configs/example_config.yaml

# Path to the real (ground-truth) dataset CSV
real_data: data/real.csv

# One entry per synthetic dataset to evaluate
synthetic_datasets:
  - name: synth1
    path: data/synth1.csv
  - name: synth2
    path: data/synth2.csv
  - name: synth3
    path: data/synth3.csv

# Optional: override automatic column type inference
# column_types:
#   age: numerical
#   sex: categorical
#   bmi: numerical
#   diagnosis: categorical

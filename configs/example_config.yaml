# stdg-eval example configuration file
# -----------------------------------------------------------
# Pass this file to the dashboard:
#   streamlit run run_dashboard.py -- --config configs/example_config.yaml
# or:
#   stdg-eval dashboard --config configs/example_config.yaml

# Path to the real (ground-truth) dataset CSV
real_data: data/real.csv

# One entry per synthetic dataset to evaluate
synthetic_datasets:
  - name: synth1
    path: data/synth1.csv
  - name: synth2
    path: data/synth2.csv
  - name: synth3
    path: data/synth3.csv

# Optional: path to precomputed fidelity results (JSON).
# Generate with:  stdg-eval precompute --config this_config.yaml --output precomputed.json
# When present, the dashboard loads these results directly and skips recomputing
# all fidelity metrics (univariate, bivariate, multivariate).
# precomputed_results: precomputed.json

# Optional: override automatic column type inference
# column_types:
#   age: numerical
#   sex: categorical
#   bmi: numerical
#   diagnosis: categorical

# Optional: enable or disable individual metrics (all default to true if omitted)
# metrics:
#   # Univariate
#   wasserstein: true
#   tvd: true
#   hellinger: true
#   # Bivariate
#   spearman: true
#   contingency: true
#   pairwise_correlation_difference: true
#   # Multivariate
#   cross_classification: true
#   propensity_mse: true
#   # Missingness
#   rate: true
#   set_distribution: true
#   classifier_auroc: true
#   dependency_structure: true
